<section class="login bg-white min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-around align-items-center gx-5">

            <div class="col-md-6 mt-4 mt-md-0">
                <div class="header-content position-relative">

                    <img class="img-fluid mb-3" src="assets/images/language.png" alt="language">
                    <img class="img-fluid d-block mt-4" src="assets/images/Frame 1.png" alt="logo">

                    <h1 class="fw-bold text-black">Create New Password</h1>

                    <div class="step-content w-25">
                        <p>Step 3 of 3 <br>
                            <span class="text-center">Forgot Password</span>
                        </p>
                    </div>

                    <p class="text-secondary mb-4">
                        Enter the new password for your account.
                    </p>

                    <form #resetForm="ngForm">

                        <div class="mb-3">
                            <label class="form-label text-black fw-semibold">Password</label>
                            <div class="input-group">
                                <input [(ngModel)]="newPassword" 
                                       name="newPassword" 
                                       type="password"
                                       class="form-control forget px-3 py-2" 
                                       placeholder="New Password"
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-black fw-semibold">Confirm Password</label>
                            <div class="input-group">
                                <input [(ngModel)]="confirmPassword" 
                                       name="confirmPassword" 
                                       type="password"
                                       class="form-control forget px-3 py-2" 
                                       placeholder="Confirm Password"
                                       required>
                            </div>
                        </div>

                        <div class="list-pass mb-4">
                            <ul class="custom-list text-secondary small">
                                <li>Password must be between 8 to 32 characters.</li>
                                <li>Must contain an uppercase character.</li>
                                <li>Must contain a number.</li>
                                <li>Must contain a special character.</li>
                            </ul>
                        </div>

                        <div class="d-flex justify-content-between align-items-center gap-2 py-2">

                            <button type="button" class="btn btn-outline-dark custom-btn" (click)="goBack()">
                                Back
                            </button>

                            <button type="button" 
                                    class="btn custom-btn btn-reset w-50" 
                                    (click)="resetPassword()"
                                    [disabled]="resetForm.invalid">
                                Reset Password
                            </button>

                        </div>

                    </form>

                </div>
            </div>

            <div class="col-md-6 text-center mt-4 mt-md-0">
                <img class="img-fluid rounded-img" src="assets/images/Image.png" alt="Image">
            </div>

        </div>
    </div>
</section>
