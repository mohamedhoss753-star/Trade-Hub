<section class="login bg-White text-white min-vh-100 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-around align-items-center gx-5">

      <div class="col-md-6">
        <div class="header-content">

          <img class="img-fluid mb-3" src="assets/images/language.png" alt="language">
          <img class="img-fluid d-block mb-4" src="assets/images/Frame 1.png" alt="logo">

          <h1 class="fw-bold">Welcome back👋</h1>
          <p class="text-secondary">We are happy to have you back</p>

          <form [formGroup]="loginForm" (ngSubmit)="login()">

            <!-- EMAIL -->
            <div class="mb-3">
              <label class="form-label">Email Address*</label>
              <input
                type="email"
                class="form-control forget"
                formControlName="email"
                placeholder="Enter your email"
              >
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control forget"
                  formControlName="password"
                  placeholder="Enter password"
                >

                <span class="input-group-text"
                      (click)="togglePassword()"
                      style="cursor:pointer">

                  <i class="fa-regular"
                     [class.fa-eye]="showPassword"
                     [class.fa-eye-slash]="!showPassword"></i>
                </span>
              </div>
            </div>

            <!-- REMEMBER + FORGOT -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">Remember me</label>
              </div>

              <a class="text-decoration-none forg"
                 (click)="goToForgetPassword()"
                 style="cursor:pointer">
                Forgot Password?
              </a>
            </div>

            <!-- BUTTON -->
            <button
              type="submit"
              class="btn btn-login w-100 py-2"
              [disabled]="isLoading">

              {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>

          </form>

          <!-- OR -->
          <div class="d-flex align-items-center my-4">
            <div class="flex-grow-1 border-top"></div>
            <span class="px-3 text-secondary small">OR</span>
            <div class="flex-grow-1 border-top"></div>
          </div>

          <!-- GOOGLE -->
          <button
            type="button"
            class="btn btn-dark w-100 py-2"
            (click)="loginWithGoogle()">

            <i class="fa-brands fa-google"></i> Login with Google
          </button>

          <!-- SIGNUP -->
          <div class="signup mt-4 text-center">
            <span>Don’t have an account? </span>
            <a (click)="goToRegister()" class="acreate" style="cursor:pointer">
              Create
            </a>
          </div>

        </div>
      </div>

      <div class="col-md-6 text-center">
        <img class="img-fluid rounded-img" src="assets/images/Image.png" alt="Image">
      </div>

    </div>
  </div>
</section>
