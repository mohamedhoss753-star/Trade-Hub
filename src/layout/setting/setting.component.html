<div class="setting-container">
  <h2>Choose a Plan</h2>
  
  <div class="toggle-switch">
    <button [class.active]="billingCycle === 'monthly'" (click)="billingCycle='monthly'">Monthly</button>
    <button [class.active]="billingCycle === 'yearly'" (click)="billingCycle='yearly'">Yearly</button>
  </div>

  <div class="plans-grid">
    <div class="plan-card" *ngFor="let plan of plans" [class.popular]="plan.isPopular">
      <span class="badge" *ngIf="plan.isPopular">Most Popular</span>
      <h3>{{ plan.name }}</h3>
      <div class="price">${{ plan.price }} <span>/month</span></div>
      
      <ul>
        <li *ngFor="let f of plan.features" class="included">✓ {{ f }}</li>
        <li *ngFor="let f of plan.limitedFeatures" class="excluded">○ {{ f }}</li>
      </ul>
      
      <button class="select-btn">{{ plan.buttonText }}</button>
    </div>
  </div>
</div>
